<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .app {
            margin: 40px 16px;
            width: 100%;
            max-width: 480px;
            background: #020617;
            border-radius: 16px;
            box-shadow: 0 24px 80px rgba(15,23,42,0.9);
            border: 1px solid rgba(148,163,184,0.3);
            overflow: hidden;
        }
        .header {
            padding: 20px 20px 12px;
            border-bottom: 1px solid rgba(148,163,184,0.2);
            background: radial-gradient(circle at top, #1d4ed8 0, transparent 55%);
        }
        .title {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin: 0 0 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .title-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(96,165,250,0.6);
            text-transform: uppercase;
            letter-spacing: 0.16em;
        }
        .subtitle {
            margin: 0;
            font-size: 0.85rem;
            color: #9ca3af;
        }
        .content {
            padding: 16px 16px 20px;
        }
        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .input-row input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border-radius: 999px;
            border: 1px solid rgba(75,85,99,0.9);
            background: rgba(15,23,42,0.85);
            color: #e5e7eb;
            outline: none;
            font-size: 0.9rem;
        }
        .input-row input[type="text"]::placeholder {
            color: #6b7280;
        }
        .input-row input[type="text"]:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 1px rgba(37,99,235,0.5);
        }
        .btn {
            border: none;
            border-radius: 999px;
            padding: 0 14px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            box-shadow: 0 10px 25px rgba(37,99,235,0.5);
        }
        .btn-primary:active {
            transform: translateY(1px);
            box-shadow: 0 6px 18px rgba(37,99,235,0.4);
        }
        .btn-ghost {
            background: transparent;
            color: #9ca3af;
        }
        .btn-ghost:hover {
            background: rgba(31,41,55,0.9);
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: #9ca3af;
        }
        .chip {
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(15,23,42,0.9);
            border: 1px solid rgba(55,65,81,0.9);
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 360px;
            overflow-y: auto;
        }
        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(15,23,42,0.95);
            border: 1px solid rgba(31,41,55,0.9);
            margin-bottom: 8px;
            transition: background 0.15s, transform 0.08s, box-shadow 0.1s;
        }
        li:hover {
            background: rgba(17,24,39,0.98);
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(15,23,42,0.9);
        }
        .todo-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .todo-title {
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .todo-title.completed {
            text-decoration: line-through;
            color: #6b7280;
        }
        .todo-meta {
            font-size: 0.7rem;
            color: #6b7280;
        }
        .todo-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .toggle {
            width: 18px;
            height: 18px;
            border-radius: 999px;
            border: 2px solid #4b5563;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .toggle.completed {
            border-color: #22c55e;
            background: radial-gradient(circle at 30% 30%, #bbf7d0 0, #22c55e 40%, #16a34a 100%);
        }
        .toggle-inner {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: transparent;
        }
        .toggle.completed .toggle-inner {
            background: #022c22;
        }
        .delete-btn {
            border-radius: 999px;
            border: none;
            background: rgba(127,29,29,0.12);
            color: #fca5a5;
            font-size: 0.7rem;
            padding: 4px 8px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background: rgba(127,29,29,0.3);
        }
        .empty {
            padding: 24px 8px;
            text-align: center;
            font-size: 0.85rem;
            color: #6b7280;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            font-size: 0.8rem;
            color: #9ca3af;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            margin-right: 6px;
            display: inline-block;
        }
        .status-dot.ok {
            background: #22c55e;
        }
        .status-dot.error {
            background: #ef4444;
        }
        .filter-group {
            display: flex;
            gap: 4px;
        }
        .filter-pill {
            border-radius: 999px;
            border: 1px solid transparent;
            padding: 2px 8px;
            font-size: 0.75rem;
            cursor: pointer;
            color: #9ca3af;
        }
        .filter-pill.active {
            border-color: rgba(59,130,246,0.8);
            background: rgba(37,99,235,0.15);
            color: #bfdbfe;
        }
        @media (max-width: 480px) {
            .app { margin-top: 24px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1 class="title">
            Todo Studio
            <span class="title-badge">Spring Boot</span>
        </h1>
        <p class="subtitle">Capture, complete, and clear your tasks.</p>
    </div>
    <div class="content">
        <div class="input-row">
            <input id="todo-input" type="text" placeholder="What do you need to get done?">
            <button id="add-btn" class="btn btn-primary">Add</button>
        </div>
        <div class="meta-row">
            <span id="count-pill" class="chip">0 items</span>
            <button id="refresh-btn" class="btn btn-ghost">Refresh</button>
        </div>
        <ul id="todo-list"></ul>
        <div class="empty" id="empty-state" style="display: none;">Nothing here yet. Add your first todo above.</div>
        <div class="status-bar">
            <div id="status-message"><span class="status-dot ok"></span>Connected</div>
            <div class="filter-group">
                <button class="filter-pill active" data-filter="all">All</button>
                <button class="filter-pill" data-filter="active">Active</button>
                <button class="filter-pill" data-filter="completed">Done</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api/todos';

    const input = document.getElementById('todo-input');
    const addBtn = document.getElementById('add-btn');
    const refreshBtn = document.getElementById('refresh-btn');
    const listEl = document.getElementById('todo-list');
    const emptyState = document.getElementById('empty-state');
    const countPill = document.getElementById('count-pill');
    const statusMessage = document.getElementById('status-message');
    const filterButtons = document.querySelectorAll('.filter-pill');

    let todos = [];
    let currentFilter = 'all';

    function setStatus(ok, message) {
        statusMessage.innerHTML =
            '<span class="status-dot ' + (ok ? 'ok' : 'error') + '"></span>' +
            (message || (ok ? 'Connected' : 'Error'));
    }

    function updateCount() {
        const total = todos.length;
        const completed = todos.filter(t => t.completed).length;
        if (total === 0) {
            countPill.textContent = '0 items';
        } else {
            countPill.textContent = total + ' items • ' + completed + ' done';
        }
    }

    function applyFilter(list) {
        if (currentFilter === 'active') {
            return list.filter(t => !t.completed);
        }
        if (currentFilter === 'completed') {
            return list.filter(t => t.completed);
        }
        return list;
    }

    function render() {
        listEl.innerHTML = '';
        const visibleTodos = applyFilter(todos);
        emptyState.style.display = visibleTodos.length === 0 ? 'block' : 'none';

        visibleTodos.forEach(todo => {
            const li = document.createElement('li');

            const left = document.createElement('div');
            left.className = 'todo-left';

            const toggle = document.createElement('div');
            toggle.className = 'toggle' + (todo.completed ? ' completed' : '');
            toggle.onclick = () => toggleTodo(todo);
            const toggleInner = document.createElement('div');
            toggleInner.className = 'toggle-inner';
            toggle.appendChild(toggleInner);

            const textContainer = document.createElement('div');
            const title = document.createElement('div');
            title.className = 'todo-title' + (todo.completed ? ' completed' : '');
            title.textContent = todo.title;
            const meta = document.createElement('div');
            meta.className = 'todo-meta';
            meta.textContent = 'ID ' + todo.id + (todo.completed ? ' • Completed' : '');
            textContainer.appendChild(title);
            textContainer.appendChild(meta);

            left.appendChild(toggle);
            left.appendChild(textContainer);

            const actions = document.createElement('div');
            actions.className = 'todo-actions';
            const del = document.createElement('button');
            del.className = 'delete-btn';
            del.textContent = 'Delete';
            del.onclick = () => deleteTodo(todo.id);
            actions.appendChild(del);

            li.appendChild(left);
            li.appendChild(actions);
            listEl.appendChild(li);
        });

        updateCount();
    }

    async function fetchTodos() {
        try {
            const res = await fetch(API_BASE);
            if (!res.ok) throw new Error('Failed to fetch');
            todos = await res.json();
            render();
            setStatus(true);
        } catch (e) {
            console.error(e);
            setStatus(false, 'Cannot reach API');
        }
    }

    async function addTodo() {
        const title = input.value.trim();
        if (!title) return;
        try {
            const res = await fetch(API_BASE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, completed: false })
            });
            if (!res.ok) throw new Error('Failed to create');
            const created = await res.json();
            todos.push(created);
            input.value = '';
            render();
            setStatus(true, 'Added "' + created.title + '"');
        } catch (e) {
            console.error(e);
            setStatus(false, 'Could not add todo');
        }
    }

    async function toggleTodo(todo) {
        try {
            const res = await fetch(API_BASE + '/' + todo.id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: todo.title, completed: !todo.completed })
            });
            if (!res.ok) throw new Error('Failed to update');
            const updated = await res.json();
            todos = todos.map(t => t.id === updated.id ? updated : t);
            render();
            setStatus(true, updated.completed ? 'Marked done' : 'Marked active');
        } catch (e) {
            console.error(e);
            setStatus(false, 'Could not update');
        }
    }

    async function deleteTodo(id) {
        try {
            const res = await fetch(API_BASE + '/' + id, { method: 'DELETE' });
            if (!res.ok && res.status !== 204) throw new Error('Failed to delete');
            todos = todos.filter(t => t.id !== id);
            render();
            setStatus(true, 'Deleted todo #' + id);
        } catch (e) {
            console.error(e);
            setStatus(false, 'Could not delete');
        }
    }

    // Event wiring
    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keypress', e => {
        if (e.key === 'Enter') {
            addTodo();
        }
    });
    refreshBtn.addEventListener('click', fetchTodos);

    filterButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            filterButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            render();
        });
    });

    // Initial load
    fetchTodos();
</script>
</body>
</html>
